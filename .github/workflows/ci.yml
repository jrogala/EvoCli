name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./...
      # integration_test.go and probe_test.go need a real dedicated
      # server install to run — they skip cleanly in CI since the
      # -server flag defaults to ../server which doesn't exist here.
      - run: go test -v -run "TestInvalidEnumRejected|TestUnsupportedGameTypeRejected" ./...
      - name: Cross-compile evocli.exe (smoke check)
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o evocli.exe .
