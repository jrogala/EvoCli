name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release as (e.g. v0.1.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Compute release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Build on a clean runner with symbols and paths stripped — this
      # reduces the surface ML-based AV engines latch onto.
      - name: Build evocli.exe
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o evocli.exe .

      - name: Record SHA256
        id: hash
        run: |
          sha=$(sha256sum evocli.exe | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Scan with VirusTotal
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          files: evocli.exe

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Download

          [`evocli.exe`](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/evocli.exe)

          **SHA-256:** `${{ steps.hash.outputs.sha256 }}`

          ## VirusTotal scan

          ${{ steps.vt.outputs.analysis }}

          ## Note on false-positive AV detections

          Microsoft Defender and some other engines may flag this as
          `Trojan:Win32/Wacatac.B!ml` or similar. This is a well-known
          false positive affecting virtually every Go binary — see the
          [Go FAQ on AV detection](https://go.dev/doc/faq#virus). This
          release is built from source on a clean GitHub Actions runner
          with:

              CGO_ENABLED=0 go build -trimpath -ldflags="-s -w"

          The SHA-256 above lets you verify the file matches what CI
          produced.
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            evocli.exe \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file release-notes.md
